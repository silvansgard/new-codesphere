<!DOCTYPE html>
<html>
<head>
  <title>Bulk STK Push</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 200px; }
    input, button { padding: 10px; margin-top: 10px; width: 100%; }
    pre { background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

<h2>Bulk STK Push Bot</h2>

<label>Amount:</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Phone Numbers (one per line):</label>
<textarea id="numbers"></textarea>

<button onclick="sendSTK()">Send STK Push</button>

<h3>Results:</h3>
<pre id="output"></pre>

<script>
async function sendSTK() {
  const numbers = document.getElementById("numbers").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch("/send-stk", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ numbers, amount })
  });

  const data = await res.json();
  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
